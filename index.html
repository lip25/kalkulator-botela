<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<!-- ✅ ANTI ZOOM -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Kasir Botela</title>

<style>
html, body {
  touch-action: manipulation;
}

body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 15px;
}

.container {
  max-width: 420px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

h1 { margin-bottom: 10px; }

.menu-btn button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
}

.americano { background: #22c55e; }
.kopisusu { background: #3b82f6; }
.matcha { background: #a855f7; }

.list {
  text-align: left;
  margin-top: 15px;
}

.item {
  background: #334155;
  padding: 10px;
  border-radius: 10px;
  margin-top: 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.hapus-btn {
  background: #ef4444;
  border: none;
  color: white;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

.total {
  font-size: 22px;
  margin-top: 10px;
  color: #38bdf8;
}

input, .btn {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
}

.btn-bayar { background: #f59e0b; }
.btn-reset { background: #ef4444; }
.btn-simpan { background: #10b981; }

.kembalian {
  margin-top: 5px;
  color: #facc15;
}
</style>
</head>

<body>

<div class="container">
  <h1>Kasir Botela ⚡</h1>

  <div class="menu-btn">
    <button class="americano" onclick="tambah('Americano',12000)">+ Americano (12k)</button>
    <button class="kopisusu" onclick="tambah('Kopi Susu',15000)">+ Kopi Susu (15k)</button>
    <button class="matcha" onclick="tambah('Matcha',15000)">+ Matcha (15k)</button>
  </div>

  <div class="list" id="list"></div>

  <div class="total" id="total">Total: Rp 0</div>

  <input type="number" id="bayar" placeholder="Uang Pembeli">

  <button class="btn btn-bayar" onclick="hitung()">Hitung Kembalian</button>

  <div class="kembalian" id="kembalian"></div>

  <button class="btn btn-simpan" onclick="simpan()">Simpan Transaksi</button>
  <button class="btn btn-reset" onclick="resetKasir()">Reset Semua</button>
</div>

<script>
let total = 0;
let transaksi = JSON.parse(localStorage.getItem("trx")) || [];
let items = [];

function tambah(nama, harga) {
  items.push({ nama, harga });
  total += harga;
  tampilkanItem();
}

function tampilkanItem() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  items.forEach((item, index) => {
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${item.nama} = Rp ${item.harga.toLocaleString("id-ID")}</span>
      <button class="hapus-btn" onclick="hapusItem(${index})">❌</button>
    `;

    list.appendChild(div);
  });

  updateTotal();
}

function hapusItem(index) {
  total -= items[index].harga;
  items.splice(index, 1);
  tampilkanItem();
}

function updateTotal() {
  document.getElementById("total").innerText =
    "Total: Rp " + total.toLocaleString("id-ID");
}

function hitung() {
  let bayar = document.getElementById("bayar").value;

  if (bayar < total || bayar == "") {
    alert("Uang kurang!");
    return;
  }

  let kembali = bayar - total;

  document.getElementById("kembalian").innerText =
    "Kembalian: Rp " + kembali.toLocaleString("id-ID");
}

function simpan() {
  if (total === 0) {
    alert("Belum ada transaksi!");
    return;
  }

  transaksi.push({
    waktu: new Date().toLocaleTimeString(),
    total: total
  });

  localStorage.setItem("trx", JSON.stringify(transaksi));

  resetKasir();
}

function resetKasir() {
  total = 0;
  items = [];
  document.getElementById("list").innerHTML = "";
  document.getElementById("total").innerText = "Total: Rp 0";
  document.getElementById("kembalian").innerText = "";
  document.getElementById("bayar").value = "";
}

/* ✅ ANTI DOUBLE TAP ZOOM */
let lastTouch = 0;
document.addEventListener("touchend", function (event) {
  let now = new Date().getTime();
  if (now - lastTouch <= 300) {
    event.preventDefault();
  }
  lastTouch = now;
}, false);
</script>

</body>
</html>
