<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasir Botela</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 15px;
}

.container {
  max-width: 420px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

h1 {
  margin-bottom: 10px;
}

select, input, button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  font-weight: bold;
  cursor: pointer;
}

.btn-tambah {
  background: #22c55e;
}

.btn-reset {
  background: #ef4444;
}

.btn-bayar {
  background: #3b82f6;
}

.list {
  text-align: left;
  margin-top: 15px;
}

.item {
  background: #334155;
  padding: 10px;
  border-radius: 10px;
  margin-top: 8px;
}

.total {
  font-size: 22px;
  margin-top: 15px;
  color: #38bdf8;
}

.kembalian {
  font-size: 18px;
  margin-top: 10px;
  color: #facc15;
}
</style>
</head>

<body>

<div class="container">
  <h1>Kasir Botela</h1>

  <select id="menu">
    <option value="12000">Americano - 12.000</option>
    <option value="15000">Kopi Susu - 15.000</option>
    <option value="17000">Matcha - 17.000</option>
  </select>

  <input type="number" id="jumlah" placeholder="Jumlah">

  <button class="btn-tambah" onclick="tambahItem()">+ Tambah</button>

  <div class="list" id="list"></div>

  <div class="total" id="total">Total: Rp 0</div>

  <input type="number" id="bayar" placeholder="Uang Pembeli">

  <button class="btn-bayar" onclick="hitungKembalian()">Hitung Kembalian</button>

  <div class="kembalian" id="kembalian"></div>

  <button class="btn-reset" onclick="resetKasir()">Reset</button>
</div>

<script>
let total = 0;

function tambahItem() {
  let menu = document.getElementById("menu");
  let jumlah = document.getElementById("jumlah").value;

  if (jumlah === "" || jumlah <= 0) {
    alert("Masukkan jumlah!");
    return;
  }

  let nama = menu.options[menu.selectedIndex].text;
  let harga = menu.value;
  let subtotal = harga * jumlah;

  total += subtotal;

  let list = document.getElementById("list");

  let item = document.createElement("div");
  item.className = "item";
  item.innerText = `${nama} x${jumlah} = Rp ${subtotal.toLocaleString("id-ID")}`;

  list.appendChild(item);

  updateTotal();

  document.getElementById("jumlah").value = "";
}

function updateTotal() {
  document.getElementById("total").innerText =
    "Total: Rp " + total.toLocaleString("id-ID");
}

function hitungKembalian() {
  let bayar = document.getElementById("bayar").value;

  if (bayar === "" || bayar < total) {
    alert("Uang kurang!");
    return;
  }

  let kembali = bayar - total;

  document.getElementById("kembalian").innerText =
    "Kembalian: Rp " + kembali.toLocaleString("id-ID");
}

function resetKasir() {
  total = 0;
  document.getElementById("list").innerHTML = "";
  document.getElementById("total").innerText = "Total: Rp 0";
  document.getElementById("kembalian").innerText = "";
  document.getElementById("bayar").value = "";
}
</script>

</body>
</html>
